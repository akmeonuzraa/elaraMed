# CI - elaraMed
# Ce workflow est structuré pour répondre à 3 questions :
#   1) QUAND doit-il s'exécuter ?
#   2) SUR QUELLE MACHINE doit-il tourner ?
#   3) QUELLE SÉQUENCE d'étapes doit-il exécuter ?

name: CI

# ─────────────────────────────────────────────
# 1) QUAND ? -> à chaque push/PR sur main, ou manuellement
# ─────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # permet de le lancer manuellement depuis l'onglet Actions

jobs:
  build:
    # ─────────────────────────────────────────────
    # 2) QUELLE MACHINE ? -> runner Ubuntu hébergé par GitHub
    # ─────────────────────────────────────────────
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 3) QUELLE SÉQUENCE D'ÉTAPES ?
      # ─────────────────────────────────────────────

      # a. Récupérer le code du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # b. Installer Python (le repo est 100% Jupyter Notebook)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # c. Installer les dépendances utilisées par les notebooks
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert nbclient \
                      pandas numpy scikit-learn xgboost \
                      matplotlib seaborn requests

      # d. Exécuter le pipeline dans l'ordre logique du projet :
      #    scraping -> cleaning -> EDA -> ML
      - name: Run scraping notebook
        run: jupyter nbconvert --to notebook --execute scraping.ipynb

      - name: Run cleaning notebook
        run: jupyter nbconvert --to notebook --execute cleaning.ipynb

      - name: Run EDA notebook
        run: jupyter nbconvert --to notebook --execute EDA.ipynb

      - name: Run ML notebook
        run: jupyter nbconvert --to notebook --execute ML.ipynb

      # e. Garder les figures/résultats générés comme artefact du build
      - name: Upload generated figures
        uses: actions/upload-artifact@v4
        with:
          name: elaramed-figures
          path: |
            fig_*.png
